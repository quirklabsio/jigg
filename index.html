<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jigg</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #f5f5f3; }
      #app canvas { display: block; }
      #choose-image-btn {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 8px 12px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        background: #f0f0ee;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        z-index: 10000;
      }
      #choose-image-btn:hover { background: #e4e4e2; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <button id="choose-image-btn" type="button">Choose Image</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
